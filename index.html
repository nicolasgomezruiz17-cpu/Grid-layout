<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RandomShop</title>
    <link rel="stylesheet" href="./Assests/Css/Style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>

    <nav>
      <div class="nav-izquierda">
        <span>RandomShop</span>
      </div>
      <div class="nav-derecha">
        <ul class="menu-links">
          <li><a href="#">Inicio</a></li>
          <li><a href="#">Catálogo</a></li>
          <li><a href="#">Ofertas</a></li>
          <li><a href="#">Contacto</a></li>
        </ul>
      </div>
    </nav>

    <section class="filtro-busqueda">
      <p>Ordenar Por:</p>
      <select>
        <option>Precio</option>
        <option>Ofertas</option>
        <option>Por debajo de $10.000</option>
      </select>
    </section>

    <main>
      <div class="grid-cards">

        <div class="card">
          <img src="./Assests/img/image-aEfFHjEsUCxrRZZTdKYVjVjTABnzFL.png" alt="Guantes" />
          <p>Guantes</p>
          <a href="#">Comprar</a>
        </div>

        <div class="card">
          <img src="./Assests/img/image-bAh1ozCAmgMo9NedqJPHFGS7GQ1reI.png" alt="Robot" />
          <p>Robot</p>
          <a href="#">Comprar</a>
        </div>

        <div class="card">
          <img src="./Assests/img/image-CgnF79zC14biDt4NuuHQq5VzcKKAET.png" alt="Detector de metales" />
          <p>Detector de metales</p>
          <a href="#">Comprar</a>
        </div>

        <div class="card">
          <img src="./Assests/img/image-GQSj5vrNQO0OcvtPyPsHQSMTVyfyeu.png" alt="Tanque de guerra" />
          <p>Tanque de guerra</p>
          <a href="#">Comprar</a>
        </div>

        <div class="card">
          <img src="./Assests/img/image-iHFK2I60hobeZy9iO4mGxPM4ob1YYs.png" alt="Computador" />
          <p>Computador</p>
          <a href="#">Comprar</a>
        </div>

        <div class="card">
          <img src="./Assests/img/image-IoSimOJFqlg5nAG8VHA06152KBwDDh.png" alt="Detector de calor" />
          <p>Detector de calor</p>
          <a href="#">Comprar</a>
        </div>

        <div class="card">
          <img src="./Assests/img/image-QIR91SsRFAxnKTd0zZbAPhdYcas7jI.png" alt="Castillo" />
          <p>Castillo</p>
          <a href="#">Comprar</a>
        </div>

        <div class="card">
          <img src="./Assests/img/image-Rva0irxBsDmoHzVWfCxByIaGzImOQ3.png" alt="Mesa de poker" />
          <p>Mesa de poker</p>
          <a href="#">Comprar</a>
        </div>

      </div>

      <div class="paginacion">
        <a href="#">«</a>
        <a href="#">1</a>
        <a href="#">2</a>
        <a href="#">3</a>
        <a href="#">»</a>
      </div>
    </main>

    <footer>
      <div class="footer-iconos">
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-instagram"></i>
      </div>
      <p>Todos los derechos reservados</p>
    </footer>

  </body>
</html>
